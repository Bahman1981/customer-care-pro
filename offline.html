<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غير متصل — Customer Care</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(145deg,#0f172a 0%,#1e3a8a 55%,#1e40af 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:#fff;direction:rtl;
}
.container{text-align:center;padding:32px 24px;max-width:420px}
.icon{font-size:80px;margin-bottom:24px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{font-size:26px;font-weight:900;margin-bottom:12px}
p{font-size:14px;color:rgba(147,197,253,.8);line-height:1.8;margin-bottom:28px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);
  color:#fff;padding:12px 28px;border-radius:12px;
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;text-decoration:none;transition:all .2s;
  backdrop-filter:blur(8px);
}
.btn:hover{background:rgba(255,255,255,.25)}
.status{
  margin-top:24px;padding:10px 18px;
  background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);
  border-radius:10px;font-size:12px;color:#fca5a5;
}
.online-status{
  background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:#6ee7b7;
}
.dots{
  position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(147,197,253,.07) 1px,transparent 1px);
  background-size:30px 30px;pointer-events:none;
}
</style>
</head>
<body>
<div class="dots"></div>
<div class="container">
  <div class="icon">📡</div>
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>
    التطبيق يحتاج اتصالاً للوصول لقاعدة البيانات.<br>
    البيانات المحفوظة محلياً متاحة بعد إعادة الاتصال.
  </p>
  <a href="/" class="btn">🔄 إعادة المحاولة</a>
  <div class="status" id="statusMsg">
    🔴 أنت غير متصل حالياً
  </div>
</div>
<script>
function checkOnline(){
  const el=document.getElementById('statusMsg');
  if(navigator.onLine){
    el.className='status online-status';
    el.textContent='🟢 عاد الاتصال! جارٍ إعادة التوجيه...';
    setTimeout(()=>location.href='/',1500);
  }else{
    el.className='status';
    el.textContent='🔴 أنت غير متصل حالياً';
  }
}
window.addEventListener('online',checkOnline);
window.addEventListener('offline',checkOnline);
checkOnline();
</script>
</body>
</html>
